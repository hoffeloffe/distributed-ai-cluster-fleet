apiVersion: apps/v1
kind: Deployment
metadata:
  name: distributed-ai-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: distributed-ai
      component: master
  template:
    metadata:
      labels:
        app: distributed-ai
        component: master
    spec:
      serviceAccountName: distributed-ai-sa
      containers:
        - name: master
          # Pinned by digest for reproducible, rollback-able deploys (corresponds to
          # the image previously deployed as :latest). Update via CI when publishing.
          image: hoffeloffe/distributed-ai-cluster@sha256:9da0d37d955bfcf7b00f3c842051754913045c365a0d2efff6f4b276402095d9
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ROLE
              value: "master"
            - name: MASTER_NODE_ID
              value: "master-1"
            - name: LOG_LEVEL
              value: "INFO"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MODEL_STORAGE_PATH
              value: "/models"
            - name: PROMETHEUS_PORT
              value: "9090"
          ports:
            - containerPort: 8080
              name: api
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: distributed-ai-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: distributed-ai
      component: worker
  template:
    metadata:
      labels:
        app: distributed-ai
        component: worker
    spec:
      serviceAccountName: distributed-ai-sa
      containers:
        - name: worker
          # Pinned by digest for reproducible, rollback-able deploys (corresponds to
          # the image previously deployed as :latest). Update via CI when publishing.
          image: hoffeloffe/distributed-ai-cluster@sha256:9da0d37d955bfcf7b00f3c842051754913045c365a0d2efff6f4b276402095d9
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ROLE
              value: "worker"
            - name: MASTER_SERVICE_NAME
              value: "distributed-ai-master"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: "INFO"
            - name: MODEL_STORAGE_PATH
              value: "/models"
            - name: PROMETHEUS_PORT
              value: "9090"
          ports:
            - containerPort: 8080
              name: inference
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          readinessProbe:
            tcpSocket:
              port: inference
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: inference
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          emptyDir: {}
